    <script>
        // 简单的 Markdown 解析器
        function parseMarkdown(markdown) {
            let html = markdown;

            // 代码块 (```)
            html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
                return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
            });

            // 单行代码 (`)
            html = html.replace(/`([^`]+)`/g, (match, code) => {
                return '<code>' + escapeHtml(code) + '</code>';
            });

            // 标题 (#)
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // 粗体 (**)
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 斜体 (*)
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 列表项 (-)
            html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, (match) => {
                return '<ul>' + match + '</ul>';
            });

            // 链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

            // 段落
            html = html.replace(/^(?!<[hul]|<pre|<blockquote)(.*)$/gim, '<p>$1</p>');

            return html;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"]/g, function(m) { return map[m]; });
        }

        // 获取文件名
        function getFileName() {
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            return urlParams.get('file') || 'README.md';
        }

        // 加载 Markdown 文件
        async function loadMarkdownFile(fileName) {
            try {
                const response = await fetch(fileName);
                if (!response.ok) {
                    throw new Error('文件不存在');
                }
                const text = await response.text();
                return text;
            } catch (error) {
                console.error('加载文件失败:', error);
                return null;
            }
        }

        // 渲染 Markdown
        function renderMarkdown(markdown) {
            let html = markdown;
            const mermaidBlocks = [];
            let mermaidIndex = 0;

            // 处理代码块 (```) - 包括 mermaid 脑图
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                if (lang === 'mermaid' || lang === 'mindmap') {
                    const blockId = 'mermaid-' + mermaidIndex++;
                    mermaidBlocks.push({ id: blockId, code: code.trim() });
                    return `<div class="mermaid" id="${blockId}"></div>`;
                }
                return '<pre><code class="language-' + (lang || 'text') + '">' + escapeHtml(code.trim()) + '</code></pre>';
            });

            // 处理行内代码 (`)
            html = html.replace(/`([^`]+)`/g, (match, code) => {
                return '<code>' + escapeHtml(code) + '</code>';
            });

            // 处理表格 - 修复后的算法
            const lines = html.split('\n');
            let result = [];
            let inTable = false;
            let tableHeader = '';
            let tableRows = [];
            let expectedColumns = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trimRight();
                
                // 检查是否是表格行（支持开头和结尾可能没有 | 的情况）
                if (line.includes('|') && !line.startsWith('```') && !line.startsWith('<')) {
                    const nextLine = i < lines.length - 1 ? lines[i + 1].trim() : '';
                    
                    // 检查下一行是否是分隔线（包含至少一个 - 和 |）
                    const isSeparator = /^[\s|:-]*-+[\s|:-]*$/.test(nextLine);
                    
                    if (isSeparator) {
                        // 这是表格头
                        inTable = true;
                        tableHeader = line;
                        // 计算预期列数
                        expectedColumns = tableHeader.split('|').filter(cell => cell.trim() !== '').length;
                        i++; // 跳过分隔线
                        tableRows = [];
                        continue;
                    } else if (inTable) {
                        // 这是表格行
                        tableRows.push(line);
                        continue;
                    }
                } else if (inTable) {
                    // 表格结束
                    if (tableHeader) {
                        result.push(buildTable(tableHeader, tableRows, expectedColumns));
                    }
                    inTable = false;
                    tableHeader = '';
                    tableRows = [];
                    expectedColumns = 0;
                }
                
                if (!inTable) {
                    result.push(line);
                }
            }
            
            // 处理最后一个表格
            if (inTable && tableHeader) {
                result.push(buildTable(tableHeader, tableRows, expectedColumns));
            }

            html = result.join('\n');
            
            // 返回mermaid块以便后续渲染
            return { html, mermaidBlocks };
        }

        // 构建表格HTML
        function buildTable(headerLine, rows, expectedColumns) {
            let tableHtml = '<table>';
            // 添加表头
            let headerCells = headerLine.split('|').map(cell => cell.trim()).filter(cell => cell !== '');
            tableHtml += '<thead><tr>';
            headerCells.forEach(cell => tableHtml += '<th>' + cell + '</th>');
            tableHtml += '</tr></thead>';
            // 添加表体
            if (rows.length > 0) {
                tableHtml += '<tbody>';
                rows.forEach(row => {
                    let cells = row.split('|').map(cell => cell.trim()).filter(cell => cell !== '');
                    // 确保列数一致
                    while (cells.length < expectedColumns) {
                        cells.push('');
                    }
                    tableHtml += '<tr>';
                    cells.forEach(cell => tableHtml += '<td>' + cell + '</td>');
                    tableHtml += '</tr>';
                });
                tableHtml += '</tbody>';
            }
            tableHtml += '</table>';
            return tableHtml;
        }

        // 处理标题、列表、段落等
        function processMarkdownContent(html) {
            // 处理标题 - 先处理长标题，避免短标题匹配长标题
            html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // 处理分隔线 (---)
            html = html.replace(/^---$/gim, '<hr>');

            // 处理引用块
            html = html.replace(/^> (.*$)/gim, (match, text) => {
                return '<blockquote>' + text + '</blockquote>';
            });

            // 处理链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, url) => {
                // 处理相对 Markdown 链接
                if (url.endsWith('.md')) {
                    return '<a href="doc.html?file=' + encodeURIComponent(url) + '">' + text + '</a>';
                }
                return '<a href="' + url + '">' + text + '</a>';
            });

            // 处理粗体和斜体 - 先处理粗体，再处理斜体
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');

            // 处理列表
            const allLines = html.split('\n');
            let processedLines = [];
            let i = 0;
            
            while (i < allLines.length) {
                const line = allLines[i].trim();
                
                if (line.match(/^([ \t]*)- (.*$)/)) {
                    // 无序列表
                    let listHtml = '<ul>';
                    while (i < allLines.length && allLines[i].trim().match(/^([ \t]*)- (.*$)/)) {
                        const match = allLines[i].trim().match(/^([ \t]*)- (.*$)/);
                        listHtml += '<li>' + match[2] + '</li>';
                        i++;
                    }
                    listHtml += '</ul>';
                    processedLines.push(listHtml);
                } else if (line.match(/^([ \t]*)\d+\. (.*$)/)) {
                    // 有序列表
                    let listHtml = '<ol>';
                    while (i < allLines.length && allLines[i].trim().match(/^([ \t]*)\d+\. (.*$)/)) {
                        const match = allLines[i].trim().match(/^([ \t]*)\d+\. (.*$)/);
                        listHtml += '<li>' + match[2] + '</li>';
                        i++;
                    }
                    listHtml += '</ol>';
                    processedLines.push(listHtml);
                } else {
                    processedLines.push(allLines[i]);
                    i++;
                }
            }
            
            html = processedLines.join('\n');

            // 处理段落
            const finalLines = html.split('\n');
            let inParagraph = false;
            let finalResult = '';

            for (let j = 0; j < finalLines.length; j++) {
                const line = finalLines[j].trim();

                if (line.startsWith('<h') || line.startsWith('<ul') || line.startsWith('<ol') || 
                    line.startsWith('</ul') || line.startsWith('</ol') || 
                    line.startsWith('<pre') || line.startsWith('</pre') ||
                    line.startsWith('<blockquote') || line.startsWith('</blockquote') ||
                    line.startsWith('<table') || line.startsWith('</table') ||
                    line.startsWith('<hr') || line.startsWith('<div')) {
                    if (inParagraph) {
                        finalResult += '</p>';
                        inParagraph = false;
                    }
                    finalResult += line + '\n';
                    continue;
                }

                if (line && !inParagraph) {
                    finalResult += '<p>' + line;
                    inParagraph = true;
                } else if (line && inParagraph) {
                    finalResult += ' ' + line;
                } else if (!line && inParagraph) {
                    finalResult += '</p>\n';
                    inParagraph = false;
                } else if (!line) {
                    finalResult += '\n';
                }
            }

            if (inParagraph) {
                finalResult += '</p>';
            }

            return finalResult;
        }

        // 获取页面标题
        function getDocumentTitle(markdown) {
            const match = markdown.match(/^#\s+(.*)$/m);
            if (match) {
                return match[1].trim();
            }
            return '文档';
        }

        // 主函数
        async function init() {
            const fileName = getFileName();
            const markdown = await loadMarkdownFile(fileName);

            if (markdown) {
                const title = getDocumentTitle(markdown);
                document.getElementById('doc-title').textContent = title;
                document.getElementById('doc-breadcrumb').textContent = title;
                document.getElementById('page-title').textContent = title + ' · LanChat CLI';

                const container = document.getElementById('markdown-container');
                // 渲染markdown并处理mermaid
                const { html, mermaidBlocks } = renderMarkdown(markdown);
                const processedHtml = processMarkdownContent(html);
                container.innerHTML = '<div class="markdown-body">' + processedHtml + '</div>';
                
                // 渲染mermaid图表
                if (mermaidBlocks.length > 0) {
                    renderMermaidDiagrams(mermaidBlocks);
                }
            } else {
                const container = document.getElementById('markdown-container');
                container.innerHTML = '<div class="error">文件加载失败</div>';
            }
        }

        // 渲染mermaid图表
        async function renderMermaidDiagrams(blocks) {
            if (!window.mermaid) {
                console.warn('Mermaid not loaded, skipping diagram rendering');
                return;
            }
            
            for (const block of blocks) {
                try {
                    const element = document.getElementById(block.id);
                    if (element) {
                        const { svg } = await window.mermaid.render(block.id, block.code);
                        element.innerHTML = svg;
                    }
                } catch (error) {
                    console.error('Error rendering mermaid diagram:', error);
                    const element = document.getElementById(block.id);
                    if (element) {
                        element.innerHTML = '<pre style="color: #ef4444;">Mermaid rendering error: ' + error.message + '</pre>';
                    }
                }
            }
        }

        // 初始化
        init();
    </script>
</body>
</html>
